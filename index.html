<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: #161f32; padding: 20px; border-radius: 12px; border: 1px solid #2d3748; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #2d3748; color: #a0aec0; cursor: pointer; border-radius: 6px; font-size: 12px; }
        .tab-btn.active { background: #3182ce; color: white; font-weight: bold; }
        .tab-content { display: none; }
        label { display: block; font-size: 11px; color: #a0aec0; margin: 15px 0 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #0b1120; border: 1px solid #4a5568; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 5px; }
        #camera-area { width: 100%; height: 200px; background: #000; border-radius: 8px; border: 1px solid #4a5568; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 15px 0; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-blue { background: #3182ce; color: white; }
        .btn-green { background: #38a169; color: white; }
        .btn-orange { background: #d69e2e; color: white; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="loading">Đang xử lý...</div>
    <div class="app-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('user-tab', this)">BÁO CÁO</button>
            <? if (isAdmin) { ?>
                <button class="tab-btn" onclick="openTab('history-tab', this)">LỊCH SỬ</button>
                <button class="tab-btn" onclick="openTab('admin-tab', this)">ADMIN</button>
            <? } ?>
        </div>

        <div id="user-tab" class="tab-content" style="display:block;">
            <label>MÃ NHÂN VIÊN</label>
            <input type="text" id="user-nvId" placeholder="Nhập mã..." oninput="lookupEmployee()">
            <div id="display-nv-name" style="font-size: 13px; font-weight: bold; margin-bottom: 10px;"></div>

            <label>MÃ THIẾT BỊ</label>
            <input type="text" id="user-tbId" placeholder="Nhập mã thiết bị...">

            <label>TÌNH TRẠNG</label>
            <select id="user-tinhTrang"><option>Tốt</option><option>Lỗi/Hỏng</option></select>

            <div id="camera-area">Camera chưa bật</div>
            <button class="btn btn-blue" onclick="toggleCamera()">📷 CHỤP ẢNH</button>
            
            <div style="display:flex; gap:10px;">
                <button class="btn btn-green" onclick="userSubmit('NHẬN')">NHẬN</button>
                <button class="btn btn-orange" onclick="userSubmit('TRẢ')">TRẢ</button>
            </div>
        </div>

        <? if (isAdmin) { ?>
        <div id="history-tab" class="tab-content">
            <div id="history-list">Đang tải...</div>
            <button class="btn btn-blue" onclick="loadHistory()">🔄 LÀM MỚI</button>
        </div>

        <div id="admin-tab" class="tab-content">
            <select id="admin-sheet-select" onchange="loadAdminData()">
                <option value="Admin_NhanVien">Nhân viên</option>
                <option value="Admin_ThietBi">Thiết bị</option>
            </select>
            <button class="btn btn-blue" onclick="openAdminEditor(-1)">+ THÊM MỚI</button>
            <div id="admin-table-area" style="margin-top:15px;"></div>
        </div>
        <? } ?>
    </div>

    <div id="admin-editor" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:80%; background:#161f32; padding:20px; border:2px solid #3182ce; border-radius:12px; z-index:11000;">
        <div id="editor-fields"></div>
        <button class="btn btn-green" onclick="adminSaveData()">LƯU</button>
        <button class="btn btn-orange" onclick="adminDeleteRow()" style="background:#e53e3e">XÓA</button>
        <button class="btn btn-blue" onclick="closeAdminEditor()">ĐÓNG</button>
    </div>

    <script>
        let base64Image = ""; let isCameraOn = false; let currentEmployeeName = "Vô danh tiểu tốt";

        function openTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
            if(id === 'history-tab') loadHistory();
            if(id === 'admin-tab') loadAdminData();
        }

        async function toggleCamera() {
            const area = document.getElementById('camera-area');
            if(!isCameraOn) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                area.innerHTML = `<video id="v" autoplay style="width:100%; height:100%; object-fit:cover;"></video>`;
                document.getElementById('v').srcObject = stream;
                window.s = stream; isCameraOn = true;
            } else {
                const v = document.getElementById('v');
                const c = document.createElement('canvas');
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v,0,0);
                base64Image = c.toDataURL("image/jpeg", 0.7);
                area.innerHTML = `<img src="${base64Image}" style="width:100%;">`;
                window.s.getTracks().forEach(t => t.stop()); isCameraOn = false;
            }
        }

        function lookupEmployee() {
            const id = document.getElementById('user-nvId').value;
            if(id.length > 2) {
                google.script.run.withSuccessHandler(n => {
                    currentEmployeeName = n;
                    const d = document.getElementById('display-nv-name');
                    d.innerText = "👤 " + n;
                    d.style.color = n === "Vô danh tiểu tốt" ? "#e53e3e" : "#38a169";
                }).getEmployeeName(id);
            }
        }

        function userSubmit(a) {
            const data = { nvId: document.getElementById('user-nvId').value, nvName: currentEmployeeName, tbId: document.getElementById('user-tbId').value, tinhTrang: document.getElementById('user-tinhTrang').value, hinhAnh: base64Image, hanhDong: a };
            if(!data.nvId || !data.tbId || !base64Image) return alert("Thiếu thông tin hoặc chưa chụp ảnh!");
            document.getElementById('loading').style.display='flex';
            google.script.run.withSuccessHandler(r => { alert(r); location.reload(); }).submitLog(data);
        }

        // --- ADMIN LOGIC ---
        let adminData = [];
        function loadAdminData() {
            const s = document.getElementById('admin-sheet-select').value;
            google.script.run.withSuccessHandler(d => {
                adminData = d;
                let h = '<table style="width:100%; font-size:12px;">';
                d.slice(1).forEach((r, i) => h += `<tr onclick="openAdminEditor(${i})" style="border-bottom:1px solid #2d3748; height:40px;"><td>${r[0]}</td><td>${r[1]}</td></tr>`);
                document.getElementById('admin-table-area').innerHTML = h + '</table>';
            }).getData(s);
        }

        function openAdminEditor(i) {
            const f = document.getElementById('editor-fields'); f.innerHTML = "";
            const row = i === -1 ? ["",""] : adminData[i+1];
            adminData[0].forEach((h, j) => f.innerHTML += `<label>${h}</label><input type="text" id="ed-${j}" value="${row[j]}">`);
            document.getElementById('admin-editor').style.display='block';
        }

        function adminSaveData() {
            const s = document.getElementById('admin-sheet-select').value;
            const r = [document.getElementById('ed-0').value, document.getElementById('ed-1').value];
            google.script.run.withSuccessHandler(res => { alert(res); closeAdminEditor(); loadAdminData(); }).adminUpdateRow(s, r);
        }

        function adminDeleteRow() {
            const s = document.getElementById('admin-sheet-select').value;
            const id = document.getElementById('ed-0').value;
            if(confirm("Xóa " + id + "?")) google.script.run.withSuccessHandler(res => { closeAdminEditor(); loadAdminData(); }).deleteDataRow(s, id);
        }

        function loadHistory() {
            google.script.run.withSuccessHandler(d => {
                let h = '<table style="width:100%; font-size:11px;">';
                d.forEach(i => h += `<tr><td>${i.time}</td><td>${i.tb}</td><td style="color:${i.action==='NHẬN'?'#38a169':'#d69e2e'}">${i.action}</td></tr>`);
                document.getElementById('history-list').innerHTML = h + '</table>';
            }).getHistory();
        }

        function closeAdminEditor() { document.getElementById('admin-editor').style.display='none'; }
    </script>
</body>
</html>
